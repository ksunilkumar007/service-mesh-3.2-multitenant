# =============================================================================
# RBAC — Tempo multi-tenant write/read access
# =============================================================================
# SOURCE: service-mesh-3.2/distributed-tracing/tempo/tempo-rbac.yaml
#
# CHANGES FROM SNO:
#   Added tenant-a and tenant-b resources alongside dev.
#   Write: otel-collector SA writes to both tenant-a and tenant-b tenants.
#   Read:  tenant-a users read tenant-a only, tenant-b users read tenant-b only.
#          Cluster admins read all.
#
# TEMPO TENANT RESOURCE NAMES:
#   Match tenantName in TempoStack CR exactly (case sensitive).
# =============================================================================

# Write access for otel-collector to both tenants
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-write
rules:
- apiGroups: ['tempo.grafana.com']
  resources: ['tenant-a', 'tenant-b']
  resourceNames: ['traces']
  verbs: ['create']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempostack-traces-write
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempostack-traces-write
subjects:
- kind: ServiceAccount
  name: otel-collector
  namespace: tracing
---
# Read access — tenant-a
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-reader-tenant-a
rules:
- apiGroups: ['tempo.grafana.com']
  resources: ['tenant-a']
  resourceNames: ['traces']
  verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempostack-traces-reader-tenant-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempostack-traces-reader-tenant-a
subjects:
- kind: Group
  apiGroup: rbac.authorization.k8s.io
  name: system:authenticated
---
# Read access — tenant-b
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-reader-tenant-b
rules:
- apiGroups: ['tempo.grafana.com']
  resources: ['tenant-b']
  resourceNames: ['traces']
  verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempostack-traces-reader-tenant-b
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempostack-traces-reader-tenant-b
subjects:
- kind: Group
  apiGroup: rbac.authorization.k8s.io
  name: system:authenticated
