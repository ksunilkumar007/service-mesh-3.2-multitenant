# =============================================================================
# Namespace — tracing (shared observability namespace)
# =============================================================================
# Hosts TempoStack and OTelCollector for ALL tenants.
# Single namespace scales to N tenants — no new infra per tenant.
#
# istio-discovery=enabled — istiod watches this namespace
# dataplane-mode=ambient  — ztunnel enrolls Tempo + OTEL pods
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: tracing
  labels:
    istio-discovery: enabled
    istio-injection: disabled
