# =============================================================================
# Waypoint PodMonitors — L7 Envoy metrics (per tenant)
# =============================================================================
# SOURCE: service-mesh-3.2/observability/monitors/waypoint-monitor.yaml
#
# CHANGES FROM SNO:
#   SNO had one PodMonitor in namespace bookinfo.
#   Multi-tenant has two waypoints — one per tenant namespace.
#   A PodMonitor is namespace-scoped so we need one per tenant.
#
# ADDING A NEW TENANT:
#   Add a new PodMonitor with the tenant's bookinfo namespace.
#   No other changes needed.
#
# METRICS FROM 15090 (Envoy):
#   envoy_http_downstream_rq_total       total requests through waypoint
#   envoy_http_downstream_rq_time        request latency histogram
#   envoy_cluster_upstream_rq_*          upstream request stats per service
#
# METRICS FROM 15020 (Istio agent):
#   istio_requests_total                 request count with labels
#   istio_request_duration_milliseconds  latency histogram
# =============================================================================

# tenant-a waypoint
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: waypoint-monitor
  namespace: bookinfo-a
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: waypoint
  podMetricsEndpoints:
  - port: http-envoy-prom
    interval: 30s
    path: /stats/prometheus
  - port: metrics
    interval: 30s
    path: /metrics
---
# tenant-b waypoint
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: waypoint-monitor
  namespace: bookinfo-b
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: waypoint
  podMetricsEndpoints:
  - port: http-envoy-prom
    interval: 30s
    path: /stats/prometheus
  - port: metrics
    interval: 30s
    path: /metrics
