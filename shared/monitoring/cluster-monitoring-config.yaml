# =============================================================================
# cluster-monitoring-config — enable user workload monitoring
# =============================================================================
# enableUserWorkload: true — deploys prometheus-user-workload stack
#
# thanosQuerier tolerations:
#   operator: Exists — tolerates ALL taints (tenant-a, tenant-b, master).
#   Required on this cluster because only 1 infra node has no taints.
#   Anti-affinity requires 2 schedulable nodes for HA replicas.
#
# LESSON LEARNED:
#   Without thanosQuerier config, OCP console Observe → Targets shows
#   "User: 0" even when prometheus-user-workload is scraping correctly.
#   Thanos Querier must federate user-workload metrics for console to
#   display them.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
data:
  config.yaml: |
    enableUserWorkload: true
    thanosQuerier:
      enableRequestLogging: false
      tolerations:
      - operator: Exists
---
# =============================================================================
# user-workload-monitoring-config — prometheus tolerations
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-workload-monitoring-config
  namespace: openshift-user-workload-monitoring
data:
  config.yaml: |
    prometheus:
      retention: 24h
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
      tolerations:
      - key: mesh
        operator: Equal
        value: tenant-a
        effect: NoSchedule
    thanosRuler:
      tolerations:
      - key: mesh
        operator: Equal
        value: tenant-a
        effect: NoSchedule
