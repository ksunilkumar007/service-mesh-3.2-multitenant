---
# ============================================================
# Stakater Multi-Tenant Operator — OperatorGroup + Subscription
# Installs cluster-wide so it can manage all tenant namespaces.
# Compatible with OLM on OpenShift / OKD.
# ============================================================
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: mto-operator-group
  namespace: multi-tenant-operator
spec:
  targetNamespaces: []   # empty = cluster-scoped watch
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: multi-tenant-operator
  namespace: multi-tenant-operator
spec:
  channel: alpha
  installPlanApproval: Automatic
  name: multi-tenant-operator
  source: operatorhubio-catalog      # change to redhat-operators on RHOCP
  sourceNamespace: olm
  # Pin to a known-good version — bump after testing
  # startingCSV: multi-tenant-operator.v0.7.0
---
apiVersion: v1
kind: Namespace
metadata:
  name: multi-tenant-operator
  labels:
    app.kubernetes.io/managed-by: mto
