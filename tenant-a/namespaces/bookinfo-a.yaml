# =============================================================================
# Namespace — bookinfo-a (tenant-a workload namespace)
# =============================================================================
# LABELS:
#   mesh=tenant-a
#     Matches discoverySelector in shared istiod (Category 2).
#     istiod watches this namespace for Services and Endpoints.
#
#   istio-discovery=enabled
#     REQUIRED for tracing: Telemetry CR defaultProviders only pushes
#     tracing config to namespaces matching all discoverySelectors.
#     Added after lesson learned — missing label caused OTel spans to
#     not be sent from waypoint proxies.
#
#   istio.io/dataplane-mode=ambient
#     Enrolls all pods in ambient mode via ztunnel (no sidecars).
#
#   istio.io/use-waypoint=waypoint
#     All L7 traffic from this namespace goes through the waypoint proxy.
#     Required for AuthorizationPolicy enforcement at L7.
#
# NOTE: istio.io/rev removed — was for per-tenant istiod (old design).
#   Single shared istiod uses revision=default, no rev label needed.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: bookinfo-a
  labels:
    mesh: tenant-a
    istio-discovery: enabled
    istio-injection: disabled
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    openshift.io/user-monitoring: "true"  
