# =============================================================================
# Namespace — bookinfo-ingress-a (tenant-a ingress gateway namespace)
# =============================================================================
# PURPOSE:
#   Dedicated namespace for the tenant-a ingress gateway.
#   Isolates ingress traffic and gives gateway a unique SPIFFE identity:
#     spiffe://cluster.local/ns/bookinfo-ingress-a/sa/bookinfo-gateway-a-istio
#   Used in AuthorizationPolicy to allow only tenant-a gateway → productpage.
#
# LABELS:
#   mesh=tenant-a
#     Matches discoverySelector in shared istiod.
#
#   istio-discovery=enabled
#     REQUIRED for tracing — see bookinfo-a.yaml note.
#
#   istio.io/dataplane-mode=ambient
#     Enrolls Gateway pod in ambient mode for outbound mTLS to bookinfo-a.
#     Gateway pod itself gets dataplane-mode=none (set by Sail Operator).
#
# NOTE: istio.io/rev removed — was for per-tenant istiod (old design).
#
# AWS NOTE:
#   Gateway Service is type=LoadBalancer — AWS NLB auto-provisioned.
#   No OCP Route needed (unlike SNO).
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: bookinfo-ingress-a
  labels:
    mesh: tenant-a
    istio-discovery: enabled
    istio-injection: disabled
    istio.io/dataplane-mode: ambient
    openshift.io/user-monitoring: "true"  
