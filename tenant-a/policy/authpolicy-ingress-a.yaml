# =============================================================================
# AuthorizationPolicy — L7 access control for bookinfo-ingress-a Gateway
# =============================================================================
# SOURCE:
#   Patched from service-mesh-3.2/gateways/ingress/authpolicy.yaml
#
# FIELDS CHANGED FROM SNO:
#   metadata.name:           ingress-policy    → ingress-policy-a
#   metadata.namespace:      bookinfo-ingress  → bookinfo-ingress-a
#   targetRefs.name:         bookinfo-gateway  → bookinfo-gateway-a
#
# PURPOSE:
#   Restricts traffic entering via the tenant-a ingress gateway to GET only.
#   Enforced at the Gateway (north-south entry point).
# =============================================================================
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: ingress-policy-a
  namespace: bookinfo-ingress-a
spec:
  targetRefs:
  - kind: Gateway
    group: gateway.networking.k8s.io
    name: bookinfo-gateway-a
  action: ALLOW
  rules:
  - to:
    - operation:
        methods: ["GET"]
