# =============================================================================
# ReferenceGrant — allows bookinfo-ingress-a to use bookinfo-a Waypoint
# =============================================================================
# SOURCE:
#   Patched from service-mesh-3.2/gateways/ingress/referencegrant.yaml
#
# FIELDS CHANGED FROM SNO:
#   metadata.name:       bookinfo-ingress-waypoint → bookinfo-ingress-waypoint-a
#   metadata.namespace:  bookinfo                  → bookinfo-a
#   spec.from.namespace: bookinfo-ingress           → bookinfo-ingress-a
#
# WHY THIS IS NEEDED:
#   The bookinfo-a Waypoint enforces L7 AuthorizationPolicy for traffic
#   destined for bookinfo-a Services (productpage, reviews, etc).
#   The ingress gateway pod lives in bookinfo-ingress-a namespace.
#
#   Without this ReferenceGrant:
#     - gateway pod: WAYPOINT=None in ztunnel-config workloads
#     - gateway traffic bypasses the bookinfo-a Waypoint
#     - L7 AuthorizationPolicy on productpage is NOT enforced
#       for external traffic entering via the gateway
#
#   With this ReferenceGrant:
#     - bookinfo-ingress-a can reference bookinfo-a/waypoint
#     - ztunnel routes gateway outbound traffic via the Waypoint
#     - L7 AuthorizationPolicy IS enforced end-to-end
#
# PLACEMENT:
#   Must be in the SAME namespace as the Waypoint (bookinfo-a).
#   Grants FROM bookinfo-ingress-a permission to reference
#   the waypoint Gateway in bookinfo-a.
#
# AFTER APPLYING — label bookinfo-ingress-a to use the waypoint:
#   oc label namespace bookinfo-ingress-a \
#     istio.io/use-waypoint=waypoint \
#     istio.io/waypoint-namespace=bookinfo-a
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: bookinfo-ingress-waypoint-a
  # Must be in the same namespace as the Waypoint being referenced
  namespace: bookinfo-a
spec:
  from:
  - group: ""
    kind: namespace
    namespace: bookinfo-ingress-a
  to:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: waypoint
