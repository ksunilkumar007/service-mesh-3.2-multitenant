# =============================================================================
# Istio — Control Plane for tenant-a (istiod-a)
# =============================================================================
# SOURCE:
#   Patched from service-mesh-3.2/mesh/ambient/istio.yaml
#
# FIELDS CHANGED FROM SNO:
#   metadata.name:                    default      → tenant-a
#   spec.namespace:                   istio-system → istio-system-a
#   pilot.trustedZtunnelNamespace:    ztunnel      → ztunnel-a
#   meshConfig.discoverySelectors:    istio-discovery=enabled → istio-discovery-a + mesh=tenant-a
#
# WHY name: tenant-a (not default):
#   The Istio CR name becomes the revision name used for namespace enrollment.
#   "default" is reserved for the SNO single-tenant control plane.
#   Using "tenant-a" means this istiod runs as revision "tenant-a".
#   Namespaces enroll by labelling: istio.io/dataplane-mode=ambient
#   (revision-based enrollment is not needed for ambient mode —
#   ambient uses the dataplane-mode label, not istio.io/rev)
#
# WHY trustedZtunnelNamespace: ztunnel-a:
#   istiod-a ONLY grants node-proxy trust to ztunnel pods in ztunnel-a.
#   ztunnel-b pods in ztunnel-b namespace are completely untrusted by istiod-a.
#   This is the key isolation boundary at the data plane level.
#   A compromised ztunnel-b cannot join the tenant-a mesh.
#
# WHY two discoverySelectors:
#   Selector 1 — istio-discovery-a: enabled
#     Matches shared control plane namespaces (istio-system-a, ztunnel-a, istio-cni)
#     These use the istio-discovery-a label because they are shared or
#     cannot carry mesh=tenant-a without conflicting with tenant-b.
#
#   Selector 2 — mesh: tenant-a
#     Matches all tenant-a workload namespaces (bookinfo-a, bookinfo-ingress-a)
#     This is the standard label applied to every tenant-a namespace.
#
#   Multiple discoverySelectors use OR logic — a namespace visible to
#   istiod-a if it matches EITHER selector.
#
#   Without both selectors:
#     - Only istio-discovery-a: istiod-a sees control plane but not workloads
#     - Only mesh=tenant-a: istiod-a sees workloads but not itself (boot failure)
#
# DEPENDENCY CHAIN:
#   namespace-istio-system-a.yaml   must exist first
#   namespace-ztunnel-a.yaml        must exist first
#   shared/cni/istio-cni.yaml       must be Healthy first
#   ztunnel-a.yaml                  apply after this CR
# =============================================================================
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  # Revision name — unique per control plane on this cluster.
  # SNO uses "default". This tenant-a control plane uses "tenant-a".
  name: tenant-a
spec:
  # Dedicated control plane namespace for tenant-a.
  # Must be labelled istio-discovery-a=enabled before applying.
  namespace: istio-system-a

  # ambient profile — same as SNO, do not change.
  profile: ambient

  values:
    pilot:
      # Trust ONLY ztunnel pods running in ztunnel-a namespace.
      # ztunnel-b in ztunnel-b namespace is untrusted by this istiod.
      # This is the data plane isolation boundary between tenants.
      trustedZtunnelNamespace: ztunnel

    meshConfig:
      # Two selectors — OR logic — istiod-a watches namespaces matching either:
      discoverySelectors:
      # Selector 1: control plane namespaces (istio-system-a, ztunnel-a, istio-cni)
      - matchLabels:
          istio-discovery-a: enabled
      # Selector 2: tenant-a workload namespaces (bookinfo-a, bookinfo-ingress-a)
      - matchLabels:
          mesh: tenant-a
