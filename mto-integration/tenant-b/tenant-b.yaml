# =============================================================================
# tenant-b.yaml — MTO v1.6.1 / v1beta3 correct schema
# =============================================================================

---
apiVersion: tenantoperator.stakater.com/v1beta1
kind: Quota
metadata:
  name: tenant-b-quota
  namespace: multi-tenant-operator
spec:
  resourcequota:
    hard:
      requests.cpu: "8"
      requests.memory: 16Gi
      limits.cpu: "16"
      limits.memory: 32Gi
      pods: "100"
      services: "30"
      count/gateways.gateway.networking.k8s.io: "4"
  limitrange:
    limits:
      - type: Container
        default:
          cpu: 500m
          memory: 512Mi
        defaultRequest:
          cpu: 100m
          memory: 128Mi
        max:
          cpu: "4"
          memory: 4Gi

---
apiVersion: tenantoperator.stakater.com/v1beta3
kind: Tenant
metadata:
  name: tenant-b
spec:
  quota: tenant-b-quota

  accessControl:
    owners:
      groups:
        - tenant-b-admins
    viewers:
      groups:
        - tenant-b-viewers
        - mesh-platform-team

  namespaces:
    onDeletePurgeNamespaces: false
    withoutTenantPrefix:
      - bookinfo-b
      - bookinfo-ingress-b

    metadata:
      common:
        labels:
          mesh: tenant-b
          istio-discovery: enabled
          istio-injection: disabled
          istio.io/dataplane-mode: ambient
          openshift.io/user-monitoring: "true"
          stakater.com/mesh-profile: ambient
          topology.kubernetes.io/tenant: tenant-b
          app.kubernetes.io/part-of: tenant-b
          app.kubernetes.io/managed-by: stakater-mto
        annotations:
          kiali.io/member-of: tenant-b

      specific:
        - namespaces:
            - bookinfo-b
          labels:
            istio.io/use-waypoint: waypoint
            stakater.com/mesh-waypoint: "true"

        - namespaces:
            - bookinfo-ingress-b
          labels:
            stakater.com/tenant-ingress: tenant-b
