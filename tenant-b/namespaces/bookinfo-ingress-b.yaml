# =============================================================================
# Namespace — bookinfo-ingress-b (tenant-b ingress gateway namespace)
# =============================================================================
# Mirror of bookinfo-ingress-a.yaml with tenant-b labels.
# See bookinfo-ingress-a.yaml for full label documentation.
#
# Gateway SPIFFE identity:
#   spiffe://cluster.local/ns/bookinfo-ingress-b/sa/bookinfo-gateway-b-istio
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: bookinfo-ingress-b
  labels:
    mesh: tenant-b
    istio-discovery: enabled
    istio-injection: disabled
    istio.io/dataplane-mode: ambient
