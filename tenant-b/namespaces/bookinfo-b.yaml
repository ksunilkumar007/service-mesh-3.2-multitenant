# =============================================================================
# Namespace — bookinfo-b (tenant-b workload namespace)
# =============================================================================
# Mirror of bookinfo-a.yaml with tenant-b labels.
# See bookinfo-a.yaml for full label documentation.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: bookinfo-b
  labels:
    mesh: tenant-b
    istio-discovery: enabled
    istio-injection: disabled
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    openshift.io/user-monitoring: "true"  
