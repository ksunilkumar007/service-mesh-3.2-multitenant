# =============================================================================
# Istio — Control Plane for tenant-b (istiod-b)
# =============================================================================
# SOURCE:
#   Patched from service-mesh-3.2/mesh/ambient/istio.yaml
#
# FIELDS CHANGED FROM SNO:
#   metadata.name:                    default      → tenant-b
#   spec.namespace:                   istio-system → istio-system-b
#   pilot.trustedZtunnelNamespace:    ztunnel      → ztunnel-b
#   meshConfig.discoverySelectors:    istio-discovery=enabled → istio-discovery-b + mesh=tenant-b
#
# WHY name: tenant-b (not default):
#   The Istio CR name becomes the revision name used for namespace enrollment.
#   "default" is reserved for the SNO single-tenant control plane.
#   Using "tenant-b" means this istiod runs as revision "tenant-b".
#   Namespaces enroll by labelling: istio.io/dataplane-mode=ambient
#   (revision-based enrollment is not needed for ambient mode —
#   ambient uses the dataplane-mode label, not istio.io/rev)
#
# WHY trustedZtunnelNamespace: ztunnel-b:
#   istiod-b ONLY grants node-proxy trust to ztunnel pods in ztunnel-b.
#   ztunnel-b pods in ztunnel-b namespace are completely untrusted by istiod-b.
#   This is the key isolation boundary at the data plane level.
#   A compromised ztunnel-b cannot join the tenant-b mesh.
#
# WHY two discoverySelectors:
#   Selector 1 — istio-discovery-b: enabled
#     Matches shared control plane namespaces (istio-system-b, ztunnel-b, istio-cni)
#     These use the istio-discovery-b label because they are shared or
#     cannot carry mesh=tenant-b without conflicting with tenant-b.
#
#   Selector 2 — mesh: tenant-b
#     Matches all tenant-b workload namespaces (bookinfo-b, bookinfo-ingress-b)
#     This is the standard label applied to every tenant-b namespace.
#
#   Multiple discoverySelectors use OR logic — a namespace visible to
#   istiod-b if it matches EITHER selector.
#
#   Without both selectors:
#     - Only istio-discovery-b: istiod-b sees control plane but not workloads
#     - Only mesh=tenant-b: istiod-b sees workloads but not itself (boot failure)
#
# DEPENDENCY CHAIN:
#   namespace-istio-system-b.yaml   must exist first
#   namespace-ztunnel-b.yaml        must exist first
#   shared/cni/istio-cni.yaml       must be Healthy first
#   ztunnel-b.yaml                  apply after this CR
# =============================================================================
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  # Revision name — unique per control plane on this cluster.
  # SNO uses "default". This tenant-b control plane uses "tenant-b".
  name: tenant-b
spec:
  # Dedicated control plane namespace for tenant-b.
  # Must be labelled istio-discovery-b=enabled before applying.
  namespace: istio-system-b

  # ambient profile — same as SNO, do not change.
  profile: ambient

  values:
    pilot:
      # Trust ONLY ztunnel pods running in ztunnel-b namespace.
      # ztunnel-b in ztunnel-b namespace is untrusted by this istiod.
      # This is the data plane isolation boundary between tenants.
      trustedZtunnelNamespace: ztunne

    meshConfig:
      # Two selectors — OR logic — istiod-b watches namespaces matching either:
      discoverySelectors:
      # Selector 1: control plane namespaces (istio-system-b, ztunnel, istio-cni)
      - matchLabels:
          istio-discovery-b: enabled
      # Selector 2: tenant-b workload namespaces (bookinfo-b, bookinfo-ingress-b)
      - matchLabels:
          mesh: tenant-b
