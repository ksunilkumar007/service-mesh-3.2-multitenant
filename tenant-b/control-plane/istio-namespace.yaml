# =============================================================================
# Namespace — istio-system-b
# =============================================================================
# PURPOSE:
#   Dedicated control plane namespace for tenant-b istiod.
#   Must be created BEFORE applying istiod-b.yaml.
#
# LABELS:
#   istio-discovery-b: enabled
#     istiod-b discoverySelector matches this label.
#     istiod-b needs to see its own namespace on first boot to discover
#     itself and its own services. Without this label, istiod-b cannot
#     see itself and will fail to initialise correctly.
#
#   mesh=tenant-b is NOT used here — istio-system-b is a control plane
#   namespace, not a workload namespace. It uses the istio-discovery-b
#   label pattern to avoid conflicts with tenant-b namespaces.
#
# WHY SEPARATE FROM istio-system:
#   Each tenant gets its own istiod with its own SPIFFE CA, xDS config,
#   and policy distribution. Sharing istio-system would mean sharing the
#   certificate authority — tenant-b certs could be validated by tenant-b
#   istiod, breaking the trust boundary between tenants.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system-b
  labels:
    istio-discovery-b: enabled
