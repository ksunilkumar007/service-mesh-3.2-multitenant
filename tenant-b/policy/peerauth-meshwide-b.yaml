# =============================================================================
# PeerAuthentication — Mesh-wide mTLS policy for tenant-b
# =============================================================================
# SOURCE:
#   Patched from service-mesh-3.2/mesh/ambient/peerauth-meshwide.yaml
#
# FIELDS CHANGED FROM SNO:
#   metadata.namespace: istio-system → istio-system-b
#
# WHY namespace=istio-system-b:
#   The Istio convention is: PeerAuthentication named "default" in the
#   rootNamespace = mesh-wide policy.
#   In istio.yaml we set: rootNamespace: istio-system-b (via Sail Operator)
#   So the mesh-wide policy for tenant-b must be in istio-system-b.
#   A policy in istio-system would only apply to the default mesh.
#
# SCOPE:
#   Applies to ALL namespaces watched by istiod-b (discoverySelectors).
#   This includes: bookinfo-b, bookinfo-ingress-b, ztunnel, istio-cni.
#   Does NOT affect tenant-b namespaces — they are not in istiod-b scope.
# =============================================================================
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system-b
spec:
  mtls:
    mode: STRICT
