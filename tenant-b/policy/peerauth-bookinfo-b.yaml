# =============================================================================
# PeerAuthentication — Namespace-scoped mTLS policy for bookinfo-b
# =============================================================================
# SOURCE:
#   Patched from service-mesh-3.2/mesh/ambient/peerauth-bookinfo.yaml
#
# FIELDS CHANGED FROM SNO:
#   metadata.name:      bookinfo-strict   → bookinfo-strict-b
#   metadata.namespace: bookinfo          → bookinfo-b
#
# PURPOSE:
#   Defence-in-depth — bookinfo-b's mTLS posture is independent of the
#   mesh-wide policy. If the mesh-wide policy changes, bookinfo-b stays STRICT.
# =============================================================================
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: bookinfo-strict-b
  namespace: bookinfo-b
spec:
  mtls:
    mode: STRICT
